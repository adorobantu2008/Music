<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0e0a1c">
<meta name="mobile-web-app-capable" content="yes">
<title>Pocket</title>
<style>
  :root{
    --bg:#0e0a1c;
    --panel:#181228;
    --panel-2:#201936;
    --line:rgba(255,255,255,.06);
    --text:#f3eee7;
    --muted:#a297c2;
    --muted-2:#6c6390;
    --amber:#ffb648;
    --amber-deep:#f0932b;
    --glow:rgba(255,182,72,.25);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:"Samsung Sans",-apple-system,"Segoe UI",Roboto,system-ui,sans-serif;
    background:var(--bg);color:var(--text);
    min-height:100%;display:flex;flex-direction:column;
    letter-spacing:.2px;overflow-x:hidden;
  }
  /* ---------- header panel ---------- */
  .top{
    background:linear-gradient(180deg,#1d1433,var(--bg));
    padding:20px 18px 14px;
    padding-top:calc(20px + env(safe-area-inset-top));
    border-bottom:1px solid var(--line);
  }
  .top-row{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px;}
  .brand{display:flex;align-items:center;gap:11px;}
  .mark{
    width:40px;height:40px;border-radius:13px;flex:none;
    background:radial-gradient(circle at 32% 26%,#ffd08a,var(--amber) 55%,#d97b1e);
    display:grid;place-items:center;box-shadow:0 6px 20px var(--glow);
  }
  .mark svg{width:21px;height:21px;fill:#2a1608;}
  h1{font-size:23px;font-weight:800;letter-spacing:-.5px;line-height:1;}
  .sub{font-size:12.5px;color:var(--muted);margin-top:3px;font-weight:500;}
  .add-btn{
    display:inline-flex;align-items:center;gap:7px;flex:none;
    background:var(--panel-2);color:#ffd08a;
    border:1px solid rgba(255,182,72,.25);
    font-weight:700;font-size:13.5px;padding:10px 15px;border-radius:12px;cursor:pointer;
    transition:transform .12s ease;
  }
  .add-btn:active{transform:scale(.94);}
  .add-btn svg{width:15px;height:15px;fill:currentColor;}
  /* search + shuffle row */
  .tools{display:flex;gap:9px;}
  .search{
    flex:1;display:flex;align-items:center;gap:9px;
    background:var(--panel);border:1px solid var(--line);
    border-radius:13px;padding:0 13px;
  }
  .search svg{width:16px;height:16px;fill:var(--muted-2);flex:none;}
  .search input{
    flex:1;background:none;border:none;outline:none;color:var(--text);
    font-size:14.5px;padding:12px 0;font-family:inherit;min-width:0;
  }
  .search input::placeholder{color:var(--muted-2);}
  .shuffle-all{
    display:inline-flex;align-items:center;gap:8px;flex:none;
    background:linear-gradient(100deg,var(--amber),var(--amber-deep));
    color:#2a1608;font-weight:800;font-size:14px;
    border:none;border-radius:13px;padding:0 17px;cursor:pointer;
    box-shadow:0 6px 18px var(--glow);
    transition:transform .12s ease;
  }
  .shuffle-all:active{transform:scale(.95);}
  .shuffle-all svg{width:17px;height:17px;fill:#2a1608;}
  /* ---------- card grid ---------- */
  main{flex:1;overflow-y:auto;padding:16px 14px 205px;}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:13px;}
  @media(min-width:520px){.grid{grid-template-columns:repeat(3,1fr);}}
  .card{
    background:var(--panel);border:1px solid var(--line);
    border-radius:17px;overflow:hidden;cursor:pointer;
    transition:transform .13s ease,border-color .13s ease,box-shadow .13s ease;
  }
  .card:active{transform:scale(.96);}
  .card.playing{
    border-color:rgba(255,182,72,.5);
    box-shadow:0 0 0 1px rgba(255,182,72,.35),0 10px 30px rgba(255,182,72,.12);
  }
  .art{
    aspect-ratio:1/1;position:relative;
    display:grid;place-items:center;overflow:hidden;
    background:var(--panel-2);
  }
  .art img{width:100%;height:100%;object-fit:cover;display:block;}
  .art .initial{font-size:34px;font-weight:800;color:rgba(255,255,255,.8);text-shadow:0 2px 8px rgba(0,0,0,.4);}
  /* play badge on artwork */
  .badge{
    position:absolute;right:9px;bottom:9px;
    width:38px;height:38px;border-radius:50%;
    background:var(--amber);display:grid;place-items:center;
    box-shadow:0 4px 14px rgba(0,0,0,.45);
    transition:transform .12s ease;
  }
  .badge svg{width:19px;height:19px;fill:#2a1608;}
  .card:active .badge{transform:scale(1.1);}
  /* equalizer overlay when playing */
  .eq{
    position:absolute;left:9px;bottom:9px;display:none;gap:3px;align-items:flex-end;
    height:22px;padding:5px 8px;border-radius:9px;
    background:rgba(14,10,28,.72);backdrop-filter:blur(6px);
  }
  .card.playing .eq{display:flex;}
  .eq b{width:3px;background:var(--amber);border-radius:2px;height:40%;}
  .eq b:nth-child(1){animation:bnc .9s ease-in-out infinite;}
  .eq b:nth-child(2){animation:bnc .68s ease-in-out infinite .12s;}
  .eq b:nth-child(3){animation:bnc 1.05s ease-in-out infinite .05s;}
  @keyframes bnc{0%,100%{height:26%;}50%{height:100%;}}
  .card.playing.paused .eq b{animation-play-state:paused;}
  .card-meta{padding:11px 12px 13px;}
  .card-title{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .card.playing .card-title{color:#ffd08a;}
  .card-sub{display:flex;justify-content:space-between;gap:8px;margin-top:3px;}
  .card-artist{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .card-dur{font-size:12px;color:var(--muted-2);font-variant-numeric:tabular-nums;flex:none;}
  /* ---------- empty state ---------- */
  .empty{
    margin:9vh auto 0;max-width:330px;text-align:center;
    display:flex;flex-direction:column;align-items:center;gap:18px;padding:0 20px;
  }
  .empty .halo{
    width:100px;height:100px;border-radius:30px;
    background:radial-gradient(circle at 35% 30%,var(--panel-2),var(--panel));
    display:grid;place-items:center;
    box-shadow:0 0 0 1px var(--line),0 24px 60px rgba(0,0,0,.5);
  }
  .empty .halo svg{width:42px;height:42px;fill:var(--amber);}
  .empty h2{font-size:20px;font-weight:800;letter-spacing:-.3px;}
  .empty p{font-size:14px;color:var(--muted);line-height:1.55;}
  .empty p b{color:#ffd08a;font-weight:700;}
  .empty .pick{
    display:inline-flex;align-items:center;gap:9px;
    background:linear-gradient(100deg,var(--amber),var(--amber-deep));
    color:#2a1608;font-weight:800;font-size:15px;
    border:none;border-radius:14px;padding:15px 26px;cursor:pointer;
    box-shadow:0 8px 22px var(--glow);
  }
  .empty .pick:active{transform:scale(.97);}
  .empty .pick svg{width:18px;height:18px;fill:#2a1608;}
  .hidden{display:none !important;}
  .no-results{grid-column:1/-1;text-align:center;color:var(--muted-2);font-size:14px;padding:40px 0;}
  /* ---------- now playing panel ---------- */
  .np{
    position:fixed;left:10px;right:10px;bottom:10px;
    bottom:calc(10px + env(safe-area-inset-bottom));
    background:rgba(26,18,46,.9);
    backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
    border:1px solid rgba(255,255,255,.09);
    border-radius:22px;
    padding:13px 16px 15px;
    box-shadow:0 18px 50px rgba(0,0,0,.55);
    transform:translateY(140%);
    transition:transform .32s cubic-bezier(.2,.85,.25,1);
  }
  .np.show{transform:translateY(0);}
  .np-top{display:flex;align-items:center;gap:13px;margin-bottom:11px;}
  .np-art{
    width:52px;height:52px;border-radius:13px;flex:none;overflow:hidden;
    display:grid;place-items:center;background:var(--panel-2);
    box-shadow:0 5px 16px rgba(0,0,0,.4);
  }
  .np-art img{width:100%;height:100%;object-fit:cover;display:block;}
  .np-art span{font-size:19px;font-weight:800;color:rgba(255,255,255,.85);}
  .np-meta{flex:1;min-width:0;}
  .np-title{font-size:15px;font-weight:750;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .np-artist{font-size:12.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
  .seek-wrap{display:flex;align-items:center;gap:10px;margin-bottom:9px;}
  .time{font-size:11px;color:var(--muted-2);font-variant-numeric:tabular-nums;flex:none;min-width:33px;}
  .time.end{text-align:right;}
  input[type=range]{
    -webkit-appearance:none;appearance:none;flex:1;height:5px;border-radius:5px;
    background:var(--panel-2);cursor:pointer;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;width:15px;height:15px;border-radius:50%;
    background:var(--amber);box-shadow:0 0 0 4px rgba(255,182,72,.16);
  }
  input[type=range]::-moz-range-thumb{width:15px;height:15px;border:none;border-radius:50%;background:var(--amber);}
  .controls{display:flex;align-items:center;justify-content:space-between;}
  .ctrl{background:none;border:none;cursor:pointer;color:var(--text);display:grid;place-items:center;padding:8px;border-radius:50%;transition:transform .1s ease,color .12s ease;}
  .ctrl:active{transform:scale(.88);}
  .ctrl svg{width:25px;height:25px;fill:currentColor;}
  .ctrl.toggle{color:var(--muted-2);}
  .ctrl.toggle.on{color:var(--amber);}
  .play-btn{
    width:54px;height:54px;border-radius:50%;
    background:var(--amber);display:grid;place-items:center;border:none;cursor:pointer;
    box-shadow:0 6px 18px var(--glow);transition:transform .1s ease;
  }
  .play-btn:active{transform:scale(.92);}
  .play-btn svg{width:27px;height:27px;fill:#2a1608;}
  /* loading toast */
  .toast{
    position:fixed;top:calc(14px + env(safe-area-inset-top));left:50%;transform:translateX(-50%) translateY(-70px);
    background:var(--panel-2);border:1px solid var(--line);color:var(--text);
    font-size:13.5px;font-weight:600;padding:11px 18px;border-radius:13px;
    box-shadow:0 12px 34px rgba(0,0,0,.5);z-index:50;
    transition:transform .28s cubic-bezier(.2,.85,.25,1);white-space:nowrap;
  }
  .toast.show{transform:translateX(-50%) translateY(0);}
  .toast b{color:#ffd08a;}
  @media (prefers-reduced-motion:reduce){
    .eq b{animation:none !important;height:60% !important;}
    .np,.toast{transition:none;}
  }
  ::-webkit-scrollbar{width:0;}
</style>
</head>
<body>
  <div class="top">
    <div class="top-row">
      <div class="brand">
        <div class="mark" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/></svg>
        </div>
        <div>
          <h1>Pocket</h1>
          <div class="sub" id="count">No songs yet</div>
        </div>
      </div>
      <button class="add-btn" id="addBtn" aria-label="Add music files">
        <svg viewBox="0 0 24 24"><path d="M11 5v6H5v2h6v6h2v-6h6v-2h-6V5z"/></svg>
        Add
      </button>
    </div>
    <div class="tools hidden" id="tools">
      <div class="search">
        <svg viewBox="0 0 24 24"><path d="M15.5 14h-.8l-.3-.3a6.5 6.5 0 1 0-.7.7l.3.3v.8l5 5 1.5-1.5-5-5zm-6 0a4.5 4.5 0 1 1 0-9 4.5 4.5 0 0 1 0 9z"/></svg>
        <input type="search" id="searchBox" placeholder="Search songs" autocomplete="off">
      </div>
      <button class="shuffle-all" id="shuffleAll" aria-label="Shuffle all songs">
        <svg viewBox="0 0 24 24"><path d="M17 3l4 4-4 4V8h-2.5l-2.3 3.2-1.2-1.7L13 7h4V5l0-2zM3 5h4c1.4 0 2.2.7 3 1.8L18 18h3v3l-4-4v2h-4c-1.4 0-2.2-.7-3-1.8L3 6H3V5zm0 12h4c1 0 1.6-.4 2.2-1.2l1.2 1.7C9.4 19.6 8.3 20 7 20H3v-3z"/></svg>
        Shuffle
      </button>
    </div>
  </div>

  <main>
    <div class="empty" id="empty">
      <div class="halo">
        <svg viewBox="0 0 24 24"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/></svg>
      </div>
      <h2>Load your downloads</h2>
      <p>Tap below, open your <b>Downloads</b> folder, then <b>long-press the first song and tap select-all</b> — every track loads in one go, with its album art.</p>
      <button class="pick" id="pickBtn">
        <svg viewBox="0 0 24 24"><path d="M11 5v6H5v2h6v6h2v-6h6v-2h-6V5z"/></svg>
        Choose songs
      </button>
    </div>
    <div class="grid" id="grid"></div>
  </main>

  <div class="np" id="np">
    <div class="np-top">
      <div class="np-art" id="npArt"><span>♪</span></div>
      <div class="np-meta">
        <div class="np-title" id="npTitle">—</div>
        <div class="np-artist" id="npArtist">—</div>
      </div>
    </div>
    <div class="seek-wrap">
      <span class="time" id="cur">0:00</span>
      <input type="range" id="seek" min="0" max="100" value="0" step="0.1" aria-label="Seek">
      <span class="time end" id="end">0:00</span>
    </div>
    <div class="controls">
      <button class="ctrl toggle" id="shuffleTog" aria-label="Shuffle">
        <svg viewBox="0 0 24 24"><path d="M17 3l4 4-4 4V8h-2.5l-2.3 3.2-1.2-1.7L13 7h4V5l0-2zM3 5h4c1.4 0 2.2.7 3 1.8L18 18h3v3l-4-4v2h-4c-1.4 0-2.2-.7-3-1.8L3 6H3V5zm0 12h4c1 0 1.6-.4 2.2-1.2l1.2 1.7C9.4 19.6 8.3 20 7 20H3v-3z"/></svg>
      </button>
      <button class="ctrl" id="prev" aria-label="Previous">
        <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
      </button>
      <button class="play-btn" id="play" aria-label="Play or pause">
        <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="ctrl" id="next" aria-label="Next">
        <svg viewBox="0 0 24 24"><path d="M16 6h2v12h-2zM6 6l8.5 6L6 18z"/></svg>
      </button>
      <button class="ctrl toggle" id="repeatTog" aria-label="Repeat">
        <svg id="repeatIcon" viewBox="0 0 24 24"><path d="M7 7h9v3l4-4-4-4v3H5v6h2V7zm10 10H8v-3l-4 4 4 4v-3h11v-6h-2v4z"/></svg>
      </button>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <input type="file" id="fileInput" accept="audio/*" multiple class="hidden">

<script>
(function(){
"use strict";
/* ============ state ============ */
var tracks=[];      // {file,url,title,artist,artUrl,cover,duration}
var current=-1, history=[], shuffle=false, repeat=0, seeking=false;
var audio=new Audio(); audio.preload="metadata";
function $(id){return document.getElementById(id);}
var grid=$("grid"), emptyEl=$("empty"), toolsEl=$("tools"), npEl=$("np");

/* ============ helpers ============ */
function fmt(s){if(!isFinite(s)||s<0)return"0:00";s=Math.floor(s);return Math.floor(s/60)+":"+("0"+s%60).slice(-2);}
function esc(s){return String(s).replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}
function hash(s){var h=0;for(var i=0;i<s.length;i++)h=s.charCodeAt(i)+((h<<5)-h);return Math.abs(h);}
function fallbackCover(n){var a=hash(n)%360,b=(a+46)%360;return"linear-gradient(135deg,hsl("+a+",55%,40%),hsl("+b+",60%,24%))";}
function parseName(fn){
  var n=fn.replace(/\.[^.]+$/,"").replace(/^\s*\d{1,3}\s*[-.)]\s*/,"").replace(/_/g," ").trim();
  var m=n.split(/\s+-\s+/);
  if(m.length>=2)return{title:m.slice(1).join(" - ").trim(),artist:m[0].trim()};
  return{title:n||fn,artist:"Unknown artist"};
}
function toast(msg){
  var t=$("toast");t.innerHTML=msg;t.classList.add("show");
  clearTimeout(t._h);t._h=setTimeout(function(){t.classList.remove("show");},2600);
}

/* ============ tag & album art parsing ============ */
function readSlice(file,start,len){
  return file.slice(start,start+len).arrayBuffer();
}
var td={
  latin1:new TextDecoder("iso-8859-1"),
  utf8:new TextDecoder("utf-8"),
  utf16:new TextDecoder("utf-16"),
  utf16be:new TextDecoder("utf-16be")
};
function decodeText(enc,bytes){
  try{
    if(enc===0)return td.latin1.decode(bytes);
    if(enc===1)return td.utf16.decode(bytes);
    if(enc===2)return td.utf16be.decode(bytes);
    return td.utf8.decode(bytes);
  }catch(e){return"";}
}
function stripNulls(s){return s.replace(/\u0000/g,"").trim();}

function parseID3(buf){
  var u8=new Uint8Array(buf), dv=new DataView(buf);
  if(u8.length<10||u8[0]!==0x49||u8[1]!==0x44||u8[2]!==0x33)return null;
  var ver=u8[3], flags=u8[5];
  var size=((u8[6]&0x7f)<<21)|((u8[7]&0x7f)<<14)|((u8[8]&0x7f)<<7)|(u8[9]&0x7f);
  var end=Math.min(10+size,u8.length), off=10;
  if(flags&0x40){ // extended header — skip it
    if(ver===4){var eh=((u8[10]&0x7f)<<21)|((u8[11]&0x7f)<<14)|((u8[12]&0x7f)<<7)|(u8[13]&0x7f);off=10+eh;}
    else{off=10+4+dv.getUint32(10);}
  }
  var out={};
  if(ver===2){ // ID3v2.2 — 3-byte IDs & sizes
    while(off+6<=end){
      var id2=String.fromCharCode(u8[off],u8[off+1],u8[off+2]);
      var sz2=(u8[off+3]<<16)|(u8[off+4]<<8)|u8[off+5];
      if(!/^[A-Z0-9]{3}$/.test(id2)||sz2<=0)break;
      var body2=off+6;
      if(id2==="TT2"||id2==="TP1"||id2==="TAL"){
        var e2=u8[body2];
        out[id2==="TT2"?"title":id2==="TP1"?"artist":"album"]=
          stripNulls(decodeText(e2,u8.subarray(body2+1,body2+sz2)));
      }else if(id2==="PIC"&&!out.pic){
        var pe=u8[body2];
        var fmt3=String.fromCharCode(u8[body2+1],u8[body2+2],u8[body2+3]).toUpperCase();
        var p2=body2+5; // skip enc + format(3) + pictype
        var term2=(pe===1||pe===2)?2:1;
        while(p2<body2+sz2){ if(u8[p2]===0&&(term2===1||u8[p2+1]===0)){p2+=term2;break;} p2+=term2; }
        out.pic=new Blob([buf.slice(p2,body2+sz2)],{type:fmt3==="PNG"?"image/png":"image/jpeg"});
      }
      off=body2+sz2;
    }
    return out;
  }
  while(off+10<=end){
    var id=String.fromCharCode(u8[off],u8[off+1],u8[off+2],u8[off+3]);
    if(!/^[A-Z0-9]{4}$/.test(id))break;
    var fsz = ver===4
      ? ((u8[off+4]&0x7f)<<21)|((u8[off+5]&0x7f)<<14)|((u8[off+6]&0x7f)<<7)|(u8[off+7]&0x7f)
      : dv.getUint32(off+4);
    if(fsz<=0||off+10+fsz>u8.length)break;
    var body=off+10;
    if(id==="TIT2"||id==="TPE1"||id==="TALB"){
      var enc=u8[body];
      out[id==="TIT2"?"title":id==="TPE1"?"artist":"album"]=
        stripNulls(decodeText(enc,u8.subarray(body+1,body+fsz)));
    }else if(id==="APIC"&&!out.pic){
      var pEnc=u8[body], p=body+1;
      var mimeStart=p; while(p<body+fsz&&u8[p]!==0)p++;
      var mime=td.latin1.decode(u8.subarray(mimeStart,p))||"image/jpeg";
      p+=1; p+=1; // null + picture-type byte
      var term=(pEnc===1||pEnc===2)?2:1;
      if(term===1){while(p<body+fsz&&u8[p]!==0)p++;p+=1;}
      else{while(p+1<body+fsz&&!(u8[p]===0&&u8[p+1]===0))p+=2;p+=2;}
      if(p<body+fsz)out.pic=new Blob([buf.slice(p,body+fsz)],{type:mime});
    }
    off=body+fsz;
  }
  return out;
}

function findAtomText(u8,dv,tag){ // m4a ©nam / ©ART text atoms
  for(var i=0;i<u8.length-24;i++){
    if(u8[i]===tag[0]&&u8[i+1]===tag[1]&&u8[i+2]===tag[2]&&u8[i+3]===tag[3]){
      var p=i+4, dsz=dv.getUint32(p);
      if(dsz>16&&dsz<4096&&String.fromCharCode(u8[p+4],u8[p+5],u8[p+6],u8[p+7])==="data"){
        return stripNulls(td.utf8.decode(u8.subarray(p+16,p+dsz)));
      }
    }
  }
  return null;
}
function parseM4A(buf){
  var u8=new Uint8Array(buf), dv=new DataView(buf), out={};
  for(var i=0;i<u8.length-24;i++){
    if(u8[i]===0x63&&u8[i+1]===0x6f&&u8[i+2]===0x76&&u8[i+3]===0x72){ // 'covr'
      var p=i+4, dsz=dv.getUint32(p);
      if(dsz>16&&p+dsz<=u8.length&&String.fromCharCode(u8[p+4],u8[p+5],u8[p+6],u8[p+7])==="data"){
        var t=dv.getUint32(p+8);
        out.pic=new Blob([buf.slice(p+16,p+dsz)],{type:t===14?"image/png":"image/jpeg"});
        break;
      }
    }
  }
  var nam=findAtomText(u8,dv,[0xa9,0x6e,0x61,0x6d]); if(nam)out.title=nam;   // ©nam
  var art=findAtomText(u8,dv,[0xa9,0x41,0x52,0x54]); if(art)out.artist=art;  // ©ART
  return out;
}

function parseFLAC(buf){
  var u8=new Uint8Array(buf), dv=new DataView(buf), out={};
  if(u8.length<8||u8[0]!==0x66||u8[1]!==0x4c||u8[2]!==0x61||u8[3]!==0x43)return null;
  var off=4;
  while(off+4<u8.length){
    var hdr=u8[off], last=hdr&0x80, type=hdr&0x7f;
    var bsz=(u8[off+1]<<16)|(u8[off+2]<<8)|u8[off+3];
    var body=off+4;
    if(body+bsz>u8.length)break;
    if(type===4){ // vorbis comment
      var p=body, vlen=dv.getUint32(p,true); p+=4+vlen;
      var n=dv.getUint32(p,true); p+=4;
      for(var k=0;k<n&&p+4<body+bsz;k++){
        var clen=dv.getUint32(p,true); p+=4;
        var c=td.utf8.decode(u8.subarray(p,p+clen)); p+=clen;
        var eq=c.indexOf("="); if(eq<0)continue;
        var key=c.slice(0,eq).toUpperCase(), val=c.slice(eq+1).trim();
        if(key==="TITLE")out.title=val;
        else if(key==="ARTIST")out.artist=val;
      }
    }else if(type===6&&!out.pic){ // picture block
      var q=body+4;
      var mlen=dv.getUint32(q); q+=4;
      var mime=td.latin1.decode(u8.subarray(q,q+mlen)); q+=mlen;
      var dlen=dv.getUint32(q); q+=4+dlen;   // description
      q+=16;                                  // dims/depth/colors
      var plen=dv.getUint32(q); q+=4;
      if(q+plen<=body+bsz)out.pic=new Blob([buf.slice(q,q+plen)],{type:mime||"image/jpeg"});
    }
    if(last)break;
    off=body+bsz;
  }
  return out;
}

function readTags(file){
  var HEAD=Math.min(file.size,3*1024*1024);
  return readSlice(file,0,HEAD).then(function(buf){
    var u8=new Uint8Array(buf);
    // MP3 / anything with ID3
    if(u8[0]===0x49&&u8[1]===0x44&&u8[2]===0x33){
      var need=10+(((u8[6]&0x7f)<<21)|((u8[7]&0x7f)<<14)|((u8[8]&0x7f)<<7)|(u8[9]&0x7f));
      if(need>HEAD&&need<12*1024*1024){
        return readSlice(file,0,need).then(parseID3);
      }
      return parseID3(buf);
    }
    // FLAC
    if(u8[0]===0x66&&u8[1]===0x4c&&u8[2]===0x61&&u8[3]===0x43)return parseFLAC(buf);
    // M4A / MP4 (ftyp box near start)
    if(u8[4]===0x66&&u8[5]===0x74&&u8[6]===0x79&&u8[7]===0x70){
      var head=parseM4A(buf);
      if(head&&(head.pic||head.title))return head;
      // moov can live at the file's tail — check there too
      var TAIL=Math.min(file.size,2*1024*1024);
      return readSlice(file,Math.max(0,file.size-TAIL),TAIL).then(parseM4A);
    }
    return null;
  }).catch(function(){return null;});
}

/* ============ load files ============ */
function addFiles(fileList){
  var arr=Array.prototype.slice.call(fileList).filter(function(f){
    return f.type.indexOf("audio")===0||/\.(mp3|m4a|aac|ogg|oga|opus|wav|flac|weba|3gp)$/i.test(f.name);
  });
  if(!arr.length){toast("No audio files in that selection");return;}
  var startIdx=tracks.length;
  arr.forEach(function(f){
    var pn=parseName(f.name);
    tracks.push({
      file:f,url:URL.createObjectURL(f),
      title:pn.title,artist:pn.artist,
      artUrl:null,cover:fallbackCover(f.name),duration:null
    });
  });
  render();
  toast("<b>"+arr.length+"</b> song"+(arr.length===1?"":"s")+" added — reading covers…");
  // read tags + art sequentially so we never hold too much in memory
  var i=startIdx;
  (function step(){
    if(i>=tracks.length)return;
    var t=tracks[i], idx=i; i++;
    readTags(t.file).then(function(tags){
      if(tags){
        if(tags.title)t.title=tags.title;
        if(tags.artist)t.artist=tags.artist;
        if(tags.pic&&tags.pic.size>100)t.artUrl=URL.createObjectURL(tags.pic);
      }
      updateCard(idx);
      if(idx===current)updateNP();
      step();
    });
  })();
  probeDurations();
}

var probing=false;
function probeDurations(){
  if(probing)return;
  var i=-1;
  for(var k=0;k<tracks.length;k++){if(tracks[k].duration===null){i=k;break;}}
  if(i<0)return;
  probing=true;
  var t=tracks[i],a=new Audio();a.preload="metadata";a.src=t.url;
  var done=function(){
    probing=false;
    var el=grid.querySelector('.card[data-i="'+i+'"] .card-dur');
    if(el)el.textContent=fmt(t.duration);
    probeDurations();
  };
  a.addEventListener("loadedmetadata",function(){t.duration=a.duration;done();});
  a.addEventListener("error",function(){t.duration=0;done();});
}

/* ============ render ============ */
var filter="";
function artHTML(t){
  if(t.artUrl)return'<img src="'+t.artUrl+'" alt="" loading="lazy">';
  return'<span class="initial">'+esc((t.title.charAt(0)||"♪").toUpperCase())+'</span>';
}
function cardHTML(t,i){
  return'<div class="art" style="'+(t.artUrl?"":"background:"+t.cover)+'">'+artHTML(t)+
    '<div class="eq"><b></b><b></b><b></b></div>'+
    '<div class="badge"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div></div>'+
    '<div class="card-meta"><div class="card-title">'+esc(t.title)+'</div>'+
    '<div class="card-sub"><div class="card-artist">'+esc(t.artist)+'</div>'+
    '<div class="card-dur">'+(t.duration===null?"·":fmt(t.duration))+'</div></div></div>';
}
function matches(t){
  if(!filter)return true;
  return(t.title+" "+t.artist).toLowerCase().indexOf(filter)>=0;
}
function render(){
  if(tracks.length===0){
    emptyEl.classList.remove("hidden");toolsEl.classList.add("hidden");
    $("count").textContent="No songs yet";grid.innerHTML="";return;
  }
  emptyEl.classList.add("hidden");toolsEl.classList.remove("hidden");
  var total=0;tracks.forEach(function(t){total+=t.duration||0;});
  $("count").textContent=tracks.length+" songs"+(total?" · "+Math.round(total/60)+" min":"");
  grid.innerHTML="";
  var shown=0;
  tracks.forEach(function(t,i){
    if(!matches(t))return;
    shown++;
    var c=document.createElement("div");
    c.className="card"+(i===current?" playing":"")+((i===current&&audio.paused)?" paused":"");
    c.setAttribute("data-i",i);
    c.innerHTML=cardHTML(t,i);
    c.addEventListener("click",function(){
      if(i===current){togglePlay();}else{playIndex(i);}
    });
    grid.appendChild(c);
  });
  if(!shown)grid.innerHTML='<div class="no-results">Nothing matches "'+esc(filter)+'"</div>';
}
function updateCard(i){
  var c=grid.querySelector('.card[data-i="'+i+'"]');
  if(c)c.innerHTML=cardHTML(tracks[i],i);
}
function refreshCards(){
  grid.querySelectorAll(".card").forEach(function(c){
    var i=+c.getAttribute("data-i");
    c.classList.toggle("playing",i===current);
    c.classList.toggle("paused",i===current&&audio.paused);
  });
}

/* ============ playback ============ */
function playIndex(i,skipHist){
  if(i<0||i>=tracks.length)return;
  if(!skipHist&&current>=0&&current!==i)history.push(current);
  current=i;
  audio.src=tracks[i].url;
  audio.play().catch(function(){});
  updateNP();refreshCards();
  npEl.classList.add("show");
  document.querySelector("main").style.paddingBottom="215px";
}
function updateNP(){
  var t=tracks[current];if(!t)return;
  $("npTitle").textContent=t.title;
  $("npArtist").textContent=t.artist;
  var a=$("npArt");
  if(t.artUrl){a.style.background="";a.innerHTML='<img src="'+t.artUrl+'" alt="">';}
  else{a.style.background=t.cover;a.innerHTML="<span>"+esc((t.title.charAt(0)||"♪").toUpperCase())+"</span>";}
  if("mediaSession" in navigator){
    var meta={title:t.title,artist:t.artist,album:"Pocket"};
    if(t.artUrl)meta.artwork=[{src:t.artUrl,sizes:"512x512",type:"image/jpeg"}];
    try{navigator.mediaSession.metadata=new MediaMetadata(meta);}catch(e){}
  }
}
function togglePlay(){
  if(current<0){if(tracks.length)playIndex(0);return;}
  if(audio.paused)audio.play().catch(function(){});else audio.pause();
}
function nextTrack(auto){
  if(!tracks.length)return;
  if(auto&&repeat===2){audio.currentTime=0;audio.play();return;}
  var i;
  if(shuffle){
    if(tracks.length===1)i=current;
    else{do{i=Math.floor(Math.random()*tracks.length);}while(i===current);}
  }else{
    i=current+1;
    if(i>=tracks.length){if(auto&&repeat!==1){audio.pause();return;}i=0;}
  }
  playIndex(i);
}
function prevTrack(){
  if(audio.currentTime>3||!history.length){audio.currentTime=0;return;}
  playIndex(history.pop(),true);
}

/* ============ events ============ */
audio.addEventListener("play",function(){$("playIcon").innerHTML='<path d="M6 5h4v14H6zm8 0h4v14h-4z"/>';refreshCards();});
audio.addEventListener("pause",function(){$("playIcon").innerHTML='<path d="M8 5v14l11-7z"/>';refreshCards();});
audio.addEventListener("timeupdate",function(){
  var d=audio.duration||0;
  $("cur").textContent=fmt(audio.currentTime);
  $("end").textContent=fmt(d);
  if(!seeking){var s=$("seek");s.max=d||100;s.value=audio.currentTime;}
});
audio.addEventListener("ended",function(){nextTrack(true);});
$("seek").addEventListener("input",function(){seeking=true;$("cur").textContent=fmt(this.value);});
$("seek").addEventListener("change",function(){audio.currentTime=+this.value;seeking=false;});
$("play").addEventListener("click",togglePlay);
$("next").addEventListener("click",function(){nextTrack(false);});
$("prev").addEventListener("click",prevTrack);
$("shuffleTog").addEventListener("click",function(){shuffle=!shuffle;this.classList.toggle("on",shuffle);});
$("repeatTog").addEventListener("click",function(){
  repeat=(repeat+1)%3;this.classList.toggle("on",repeat!==0);
  $("repeatIcon").innerHTML=repeat===2
    ?'<path d="M7 7h9v3l4-4-4-4v3H5v6h2V7zm10 10H8v-3l-4 4 4 4v-3h11v-6h-2v4z"/><text x="12" y="15" font-size="8" font-weight="800" text-anchor="middle" fill="currentColor">1</text>'
    :'<path d="M7 7h9v3l4-4-4-4v3H5v6h2V7zm10 10H8v-3l-4 4 4 4v-3h11v-6h-2v4z"/>';
});
$("shuffleAll").addEventListener("click",function(){
  if(!tracks.length)return;
  shuffle=true;$("shuffleTog").classList.add("on");
  playIndex(Math.floor(Math.random()*tracks.length));
});
$("searchBox").addEventListener("input",function(){filter=this.value.trim().toLowerCase();render();});
function openPicker(){$("fileInput").click();}
$("addBtn").addEventListener("click",openPicker);
$("pickBtn").addEventListener("click",openPicker);
$("fileInput").addEventListener("change",function(){
  if(this.files&&this.files.length)addFiles(this.files);
  this.value="";
});
document.addEventListener("keydown",function(e){
  if(e.target.tagName==="INPUT")return;
  if(e.code==="Space"){e.preventDefault();togglePlay();}
  else if(e.code==="ArrowRight")nextTrack(false);
  else if(e.code==="ArrowLeft")prevTrack();
});
if("mediaSession" in navigator){
  navigator.mediaSession.setActionHandler("play",togglePlay);
  navigator.mediaSession.setActionHandler("pause",togglePlay);
  navigator.mediaSession.setActionHandler("nexttrack",function(){nextTrack(false);});
  navigator.mediaSession.setActionHandler("previoustrack",prevTrack);
}
})();
</script>
</body>
</html>
